<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Portfolio</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .container {
            margin-top: 40px;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .profile-card img {
            border-radius: 10px;
            object-fit: cover;
        }

        .btn-primary {
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2>🚀 My Portfolio Dashboard</h2>
        <p class="text-muted">Add and manage your profile details</p>
    </div>

    <!-- FORM CARD -->
    <div class="card p-4 mb-4">
        <h4 class="mb-3">Add Profile</h4>

        <form action="/save" method="post" enctype="multipart/form-data">
            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Name</label>
                    <input class="form-control" type="text" name="name">
                </div>

                <div class="col-md-6 mb-3">
                    <label>College</label>
                    <input class="form-control" type="text" name="college">
                </div>

                <div class="col-md-6 mb-3">
                    <label>CGPA</label>
                    <input class="form-control" type="text" name="cgpa">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Skills</label>
                    <input class="form-control" type="text" name="skills">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Photo</label>
                    <input class="form-control" type="file" name="photoFile">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Resume</label>
                    <input class="form-control" type="file" name="resumeFile">
                </div>

            </div>

            <button class="btn btn-primary mt-2">Save Profile</button>
        </form>
    </div>

    <!-- PROFILE LIST -->
    <h4 class="mb-3">Saved Profiles</h4>

    <div class="row" th:each="p : ${profiles}">

        <div class="col-md-6 mb-4">
            <div class="card profile-card p-3">

                <div class="d-flex align-items-center gap-3">
                    <img th:src="${p.photo}" width="100" height="100">

                    <div>
                        <h5 th:text="${p.name}"></h5>
                        <p class="mb-1">🎓 <span th:text="${p.college}"></span></p>
                        <p class="mb-1">📊 CGPA: <span th:text="${p.cgpa}"></span></p>
                        <p>💡 Skills: <span th:text="${p.skills}"></span></p>
                    </div>
                </div>

                <a class="btn btn-outline-dark mt-3"
                   th:href="${p.resume}" target="_blank">
                    View Resume
                </a>

            </div>
        </div>

    </div>

</div>
</body>
</html>
